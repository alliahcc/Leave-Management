openapi: 3.0.0
info:
  title: Leave Management API
  version: 1.0.0
  description: MERN Leave Management Backend
servers:
  - url: http://localhost:5000/api/v1
    description: Development server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
tags:
  - name: Auth
    description: Authentication endpoints
  - name: Employee
    description: Employee profile and leave management
  - name: Admin
    description: Admin user and leave management

paths:
  /auth/login:
    post:
      summary: Login user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: aljun.dalman@neu.edu.ph
                password:
                  type: string
                  example: Admin123
      responses:
        '200':
          description: Successful login
        '401':
          description: Invalid credentials

  /auth/me:
    get:
      summary: Get current user profile
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user details
        '404':
          description: User not found

  /auth/change-password:
    post:
      summary: Change password
      tags: [Auth]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                currentPassword:
                  type: string
                  example: Admin123
                newPassword:
                  type: string
                  example: NewPass456
      responses:
        '200':
          description: Password changed successfully
        '400':
          description: Current password incorrect

  /employee/employees/{id}:
    get:
      summary: Get employee by ID
      tags: [Employee]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Employee details
        '403':
          description: Access denied
        '404':
          description: Employee not found

  /employee/leaves/my:
    get:
      summary: Get logged-in employee leave history
      tags: [Employee]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successfully retrieved leave history
        '401':
          description: Unauthorized - missing or invalid token
        '500':
          description: Server error while fetching leave history
  
  /employee/leaves:
    post:
      summary: Create leave request
      tags: [Employee]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                leaveType:
                  type: string
                  enum: [vacation, sick, personal, other]
                startDate:
                  type: string
                  format: date
                endDate:
                  type: string
                  format: date
                reason:
                  type: string
      responses:
        '201':
          description: Leave request created
        '400':
          description: Insufficient leave balance

  /employee/leaves/{id}/cancel:
    patch:
      summary: Cancel leave request
      tags: [Employee]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Leave cancelled
        '404':
          description: Leave not found

  /admin/users:
    post:
      summary: Create new user
      tags: [Admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [employee, admin]
      responses:
        '201':
          description: User created
        '400':
          description: Email already exists

  /admin/employees:
    get:
      summary: Get all employees
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of employees

  /admin/stats:
    get:
      summary: Get admin statistics
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Admin stats

  /admin/employees/{id}/remove:
    patch:
      summary: Soft delete employee
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Employee soft-deleted
        '404':
          description: Employee not found

  /admin/employees/{id}/restore:
    patch:
      summary: Restore employee
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Employee restored
        '404':
          description: Employee not found

  /admin/employees/{id}/permanent:
    delete:
      summary: Permanently delete employee
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Employee permanently deleted
        '404':
          description: Employee not found

  /admin/leaves:
    get:
      summary: Get all leaves
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of leaves

  /admin/leaves/{id}:
    get:
      summary: Get leave details by ID
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Leave request details
        '404':
          description: Leave not found
        '500':
          description: Server error

  /admin/leaves/{id}/status:
    patch:
      summary: Update leave status
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [approved, rejected]
      responses:
        '200':
          description: Leave status updated
        '400':
          description: Only pending leaves can be updated
        '404':
          description: Leave not found

  /admin/leaves/{id}/trash:
    patch:
      summary: Move leave to trash
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Leave trashed
        '404':
          description: Leave not found

  /admin/leaves/{id}/restore:
    patch:
      summary: Restore leave
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Leave restored
        '404':
          description: Leave not found

  /admin/leaves/{id}/permanent:
    delete:
      summary: Permanently delete leave
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Leave permanently deleted
        '404':
          description: Leave not found